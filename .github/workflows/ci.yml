name: CI - Space Defender
 
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
 
jobs:
  test:
    name: Build & Tests NUnit
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup old licenses
        run: |
          # Supprime les configs dans le répertoire partagé (si accessible)
          sudo rm -rf /usr/share/unity3d/config/ || true
          # Supprime les licences dans le home de l'utilisateur courant (runner)
          rm -rf ~/.local/share/unity3d/unity/
          rm -rf ~/.cache/unity3d
          # Recréer le dossier de cache local au cas où
          mkdir -p ~/.cache/unity3d

      - name: Unity - Activate
        uses: game-ci/unity-activate@v2
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
 
      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-

      - name: Run Tests (EditMode)
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: .
          testMode: EditMode
          artifactsPath: test-results/
          coverageOptions: generateAdditionalMetrics;generateHtmlReport
 
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14
 
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: CodeCoverage/
          retention-days: 14
